<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Estratégico · Oxigenar & Pulmonair 2026</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<style>
body {
  background:#0a0f1e;
  color:#fff;
  font-family: 'DM Sans', sans-serif;
}
.card { margin:20px; padding:20px; background:#111827; border-radius:10px;}
</style>
</head>

<body>

<h1 style="padding:20px">Dashboard Oxigenar</h1>

<div class="card">
  <canvas id="chartConsolidado"></canvas>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {

console.log("Dashboard carregando...");

// ===== DADOS =====
const ox = {
  2023: [875698,654234,835612],
  2024: [883985,786069,956028],
  2025: [1269452,1311130,1082924],
  2026: [1473848,1132194,1572774]
};

const pu = {
  2023: [160204,114135,241257],
  2024: [300250,334117,456926],
  2025: [541621,592255,515842],
  2026: [818735,849322,1091961]
};

function sum(arr){ return arr.reduce((a,b)=>a+b,0); }

// ===== VALIDAÇÃO =====
const canvas = document.getElementById('chartConsolidado');

if(!canvas){
  console.error("Canvas não encontrado");
  return;
}

// ===== GRÁFICO =====
const ctx = canvas.getContext('2d');

new Chart(ctx, {
  type: 'bar',
  data: {
    labels: ['2023','2024','2025','2026'],
    datasets: [
      {
        label: 'Oxigenar',
        data: [
          sum(ox[2023]),
          sum(ox[2024]),
          sum(ox[2025]),
          sum(ox[2026])
        ]
      },
      {
        label: 'Pulmonair',
        data: [
          sum(pu[2023]),
          sum(pu[2024]),
          sum(pu[2025]),
          sum(pu[2026])
        ]
      }
    ]
  }
});

});
</script>

</body>
</html>
